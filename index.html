<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meggetland</title>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: "Libre Baskerville", Georgia, "Times New Roman", serif;
      color: #f5f2ec;
    }

    .hero {
      height: 100vh;
      width: 100%;
      background: url("View of bridge over Union Canal, Meggatland.png") no-repeat center center / cover;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(35, 30, 25, 0.55);
    }

    .content {
      position: relative;
      z-index: 1;
      padding: 20px;
      max-width: 800px;
    }

    h1 {
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .divider {
      width: 60px;
      height: 1px;
      background: rgba(245, 242, 236, 0.6);
      margin: 1.5rem auto 0;
    }

    p {
      margin-top: 1.25rem;
      font-size: clamp(1rem, 2vw, 1.3rem);
      opacity: 0.85;
      letter-spacing: 0.1em;
      text-transform: lowercase;
    }
  </style>
</head>
<body>
  <div class="hero">
    <div class="content">
      <h1>Meggetland</h1>
      <div class="divider"></div>
      <p>check back soon</p>
      <a href="https://www.meggetland.com/trailer/">view trailer</a>
    </div>
  </div>
</body>
</html>
