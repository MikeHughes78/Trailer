<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png">
  
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome to Meggetland</title>

  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: "Libre Baskerville", Georgia, "Times New Roman", serif;
      color: #f5f2ec;
      overflow: hidden;
    }

    .hero {
      height: 100vh;
      width: 100%;
      background: url("4+canal.jpg") no-repeat center center / cover;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(35, 30, 25, 0.6);
    }

    .content {
      position: relative;
      z-index: 1;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      transform: translateY(5%);
    }

    h1 {
      font-size: clamp(3rem, 9vw, 7rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 0.95;
      opacity: 0;
      animation: fadeIn 1.5s ease forwards;
    }

    .divider {
      width: 70px;
      height: 1px;
      background: rgba(245, 242, 236, 0.7);
      margin-top: 1.2rem;
      opacity: 0;
      animation: fadeIn 1.5s ease 0.3s forwards;
    }

    .footer-links {
      margin-top: 1.2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.7rem;
      opacity: 0;
      animation: fadeIn 1.5s ease 0.6s forwards;
    }

    .footer-links a {
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(245, 242, 236, 0.6);
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .footer-links a::after {
      content: "";
      display: block;
      width: 0;
      height: 1px;
      background: rgba(245, 242, 236, 0.6);
      margin-top: 6px;
      transition: width 0.3s ease;
    }

    .footer-links a:hover {
      color: rgba(245, 242, 236, 0.9);
    }

    .footer-links a:hover::after {
      width: 100%;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Standard mobile */
    @media (max-width: 640px) {
      h1 {
        font-size: clamp(2.5rem, 10vw, 4rem);
      }

      .footer-links a {
        font-size: 0.7rem;
      }
    }

    /* Landscape mobile */
    @media (max-height: 500px) and (orientation: landscape) {
      .content {
        transform: translateY(0);
      }

      h1 {
        font-size: clamp(2rem, 6vw, 3.5rem);
      }

      .divider {
        margin-top: 0.8rem;
      }

      .footer-links {
        margin-top: 0.8rem;
        gap: 0.4rem;
      }

      .footer-links a {
        font-size: 0.6rem;
        letter-spacing: 0.12em;
      }
    }
  </style>
</head>

<body>
  <div class="hero">
    <div class="content">
      <h1>Meggetland</h1>
      <div class="divider"></div>

      <div class="footer-links">
        <a href="https://www.meggetland.com/trailer/">BUCS trailer plan</a>
        <a href="https://www.meggetland.com/regatta/">Regatta leaderboard</a>
      </div>
    </div>
  </div>
</body>
</html>
