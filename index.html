<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meggetland</title>

  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: "Libre Baskerville", Georgia, "Times New Roman", serif;
      color: #f5f2ec;
      overflow: hidden;
    }

    .hero {
      height: 100vh;
      width: 100%;
      background: url("View of bridge over Union Canal, Meggatland.png") no-repeat center center / cover;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    /* Warm heritage overlay */
    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(35, 30, 25, 0.6);
    }

    .content {
      position: relative;
      z-index: 1;
      padding: 20px;
      transform: translateY(-3vh);
    }

    h1 {
      font-size: clamp(3rem, 9vw, 7rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 0.95;
    }

    .divider {
      width: 70px;
      height: 1px;
      background: rgba(245, 242, 236, 0.7);
      margin: 1.75rem auto 0;
    }

    p {
      margin-top: 1.6rem;
      font-size: clamp(1.1rem, 2.5vw, 2rem);
      letter-spacing: 0.1em;
      opacity: 0.9;
      text-transform: lowercase;
    }

    /* Bottom link */
    .footer-link {
      position: absolute;
      left: 50%;
      bottom: 4rem;
      transform: translateX(-50%);
      z-index: 1;

      font-size: 0.75rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;

      color: rgba(245, 242, 236, 0.6);
      text-decoration: none;

      opacity: 0;
      animation: fadeIn 2s ease 0.2s forwards;
    }

    .footer-link::after {
      content: "";
      display: block;
      width: 0;
      height: 1px;
      background: rgba(245, 242, 236, 0.6);
      margin-top: 6px;
      transition: width 0.3s ease;
    }

    .footer-link:hover {
      color: rgba(245, 242, 236, 0.9);
    }

    .footer-link:hover::after {
      width: 100%;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }

    @media (max-width: 640px) {
      .footer-link {
        bottom: 4rem;
        font-size: 0.7rem;
      }
    }
  </style>
</head>

<body>
  <div class="hero">
    <div class="content">
      <h1>Meggetland</h1>
      <div class="divider"></div>
      <p>check back soon</p>
    </div>

    <a class="footer-link" href="https://www.meggetland.com/trailer/">See the BUCS trailer plan</a>
  </div>
</body>
</html>
