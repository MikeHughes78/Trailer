<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png">

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome to Meggetland</title>

  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      font-family: "Libre Baskerville", Georgia, "Times New Roman", serif;
      color: #f5f2ec;
      overflow: hidden;
      background: #231e19;
    }

    .hero {
      position: relative;
      height: 100vh;
      width: 100%;
      overflow: hidden;
    }

    .bg-image,
    .bg-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 35%;
    }

    .bg-image {
      background: url("4+canal.jpg") no-repeat center 35% / cover;
      z-index: 0;
      animation: imageCycle 30s ease-in-out infinite;
    }

    .bg-video {
      z-index: 1;
      opacity: 0;
      animation: videoCycle 30s ease-in-out infinite;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 2;
      background: rgba(35, 30, 25, 0.58);
    }

    .content {
      position: absolute;
      top: 67%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 3;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: min(90%, 900px);
    }

    h1 {
      font-size: clamp(3rem, 9vw, 7rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 0.95;
      opacity: 0;
      animation: titleReveal 6s ease forwards;
    }

    .divider {
      width: 70px;
      height: 1px;
      background: rgba(245, 242, 236, 0.6);
      margin-top: 1.1rem;
      opacity: 0;
      animation: fadeInSoft 1s ease 3.8s forwards;
    }

    .footer-links {
      margin-top: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
      opacity: 0;
      animation: fadeInSoft 1s ease 2s forwards;
    }

    .footer-links a {
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(245, 242, 236, 0.55);
      text-decoration: none;
    }

    @keyframes imageCycle {
      0%, 16.5% { opacity: 1; }
      23%, 93% { opacity: 0; }
      100% { opacity: 1; }
    }

    @keyframes videoCycle {
      0%, 16.5% { opacity: 0; }
      23%, 93% { opacity: 1; }
      100% { opacity: 0; }
    }

    @keyframes titleReveal {
      0% { opacity: 0; }
      100% { opacity: 0.5; }
    }

    @keyframes fadeInSoft {
      from { opacity: 0; }
      to { opacity: 0.75; }
    }
  </style>
</head>

<body>
  <div class="hero">
    <div class="bg-image"></div>

    <video
      class="bg-video"
      muted
      loop
      playsinline
      webkit-playsinline
      preload="auto"
      poster="4+canal.jpg"
    >
      <source src="SCP-Pre-BUCS.mp4" type="video/mp4">
    </video>

    <div class="content">
      <h1>Meggetland</h1>
      <div class="divider"></div>

      <div class="footer-links">
        <a href="https://www.meggetland.com/trailer/">BUCS trailer plan</a>
        <a href="https://www.meggetland.com/regatta/">Regatta leaderboard</a>
      </div>
    </div>
  </div>

  <script>
    const video = document.querySelector(".bg-video");

    function attemptPlay() {
      video.play().catch(() => {});
    }

    // Try autoplay immediately (works on some devices)
    window.addEventListener("load", attemptPlay);

    // Fallback: first touch anywhere triggers playback
    document.addEventListener("touchstart", () => {
      video.play();
    }, { once: true });

    document.addEventListener("click", () => {
      video.play();
    }, { once: true });
  </script>
</body>
</html>
