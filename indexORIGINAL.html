<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png">

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome to Meggetland</title>

  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: "Libre Baskerville", Georgia, "Times New Roman", serif;
      color: #f5f2ec;
      overflow: hidden;
      background: #231e19;
    }

    .hero {
      position: relative;
      height: 100vh;
      width: 100%;
      overflow: hidden;
    }

    /* Background layer for zoom effect */
    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: url("4+canal.jpg") no-repeat center 35% / cover;
      animation: slowZoom 30s ease-out forwards;
    }

    /* Overlay */
    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(35, 30, 25, 0.58);
    }

    .content {
      position: absolute;
      top: 67%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: min(90%, 900px);
    }

    h1 {
      font-size: clamp(3rem, 9vw, 7rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 0.95;
      opacity: 0;
      filter: blur(6px);
      animation: titleReveal 6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    .divider {
      width: 70px;
      height: 1px;
      background: rgba(245, 242, 236, 0.6);
      margin-top: 1.1rem;
      opacity: 0;
      animation: fadeInSoft 1s ease 3.8s forwards;
    }

    .footer-links {
      margin-top: 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.65rem;
      opacity: 0;
      animation: fadeInSoft 1s ease 2s forwards;
    }

    .footer-links a {
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(245, 242, 236, 0.55);
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .footer-links a::after {
      content: "";
      display: block;
      width: 0;
      height: 1px;
      background: rgba(245, 242, 236, 0.5);
      margin-top: 6px;
      transition: width 0.3s ease;
    }

    .footer-links a:hover {
      color: rgba(245, 242, 236, 0.85);
    }

    .footer-links a:hover::after {
      width: 100%;
    }

    @keyframes titleReveal {
      0% {
        opacity: 0;
        filter: blur(6px);
      }
      35% {
        opacity: 1;
        filter: blur(0);
      }
      100% {
        opacity: 0.5;
        filter: blur(0);
      }
    }

    @keyframes fadeInSoft {
      from {
        opacity: 0;
      }
      to {
        opacity: 0.75;
      }
    }

    @keyframes slowZoom {
      from {
        transform: scale(1);
      }
      to {
        transform: scale(1.08);
      }
    }

    @media (max-width: 640px) {
      .hero::before {
        background-position: center 30%;
      }

      .content {
        top: 69%;
        width: 92%;
      }

      h1 {
        font-size: clamp(2.5rem, 11vw, 4.2rem);
      }

      .footer-links a {
        font-size: 0.68rem;
        letter-spacing: 0.14em;
      }
    }

    @media (max-height: 500px) and (orientation: landscape) {
      .hero::before {
        background-position: center 25%;
      }

      .content {
        top: 72%;
        width: 92%;
      }

      h1 {
        font-size: clamp(2rem, 6vw, 3.6rem);
      }

      .divider {
        width: 56px;
        margin-top: 0.7rem;
      }

      .footer-links {
        margin-top: 0.7rem;
        gap: 0.35rem;
      }

      .footer-links a {
        font-size: 0.58rem;
        letter-spacing: 0.1em;
      }
    }
  </style>
</head>

<body>
  <div class="hero">
    <div class="content">
      <h1>Meggetland</h1>
      <div class="divider"></div>

      <div class="footer-links">
        <a href="https://www.meggetland.com/trailer/">BUCS trailer plan</a>
        <a href="https://www.meggetland.com/regatta/">Regatta leaderboard</a>
      </div>
    </div>
  </div>
</body>
</html>
